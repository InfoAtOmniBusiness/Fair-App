services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fair
      POSTGRES_PASSWORD: fair_dev_password
      POSTGRES_DB: fair
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fair"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://fair:fair_dev_password@postgres:5432/fair
      JWT_SECRET_KEY: change-me-in-production
      # AMAZON_AFFILIATE_TAG: yourapp-20   # uncomment when approved
    ports: ["8000:8000"]
    command: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"
