<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fair — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EF; --ink:#1C2B26; --muted:#6E7B74; --line:#E4DCCB;
    --green:#0B8A5C; --green-deep:#06614A; --yellow:#C58A12; --red:#C0392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0}
  body{
    font-family:'Karla',sans-serif; color:var(--ink); background:var(--paper);
    background-image:radial-gradient(circle at 18% -8%, #EDF7F0 0, transparent 42%),
                     repeating-linear-gradient(0deg, transparent 0 23px, rgba(28,43,38,.025) 23px 24px);
    min-height:100vh; display:flex; justify-content:center; padding:22px 14px 60px;
  }
  .phone{width:100%; max-width:430px}
  header{display:flex; align-items:center; gap:12px; margin-bottom:6px}
  .logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#34D399,#047857);
        display:grid;place-items:center;color:#fff;font:700 22px Fraunces,serif;
        box-shadow:0 8px 18px rgba(4,120,87,.28)}
  h1{font:700 30px/1 'Fraunces',serif; letter-spacing:-.02em}
  .tag{color:var(--muted); font-size:13px; margin:2px 0 14px 56px}
  .mode{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--green-deep);
        border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 11px;
        display:inline-block; margin-bottom:18px}
  .scanbox{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px;
           box-shadow:0 14px 34px rgba(28,43,38,.07)}
  label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .row{display:flex; gap:8px; margin-top:7px}
  input{flex:1; font:500 16px Karla; padding:12px 13px; border:1.5px solid var(--line);
        border-radius:11px; background:#FCFAF5; min-width:0}
  input:focus{outline:none; border-color:var(--green)}
  button{font:700 15px Karla; border:none; border-radius:11px; cursor:pointer}
  .go{background:var(--green-deep); color:#fff; padding:0 20px; transition:transform .12s}
  .go:active{transform:scale(.96)}
  .seen{margin-top:10px}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:16px}
  .chip{background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 13px;
        font:500 13px Karla; color:var(--ink)}
  .chip:active{background:#F1ECE0}
  .chip b{color:var(--green-deep)}
  #result{margin-top:20px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden;
        box-shadow:0 14px 34px rgba(28,43,38,.07); animation:rise .35s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  .phead{display:flex; gap:14px; padding:16px; align-items:center; border-bottom:1px dashed var(--line)}
  .phead img{width:62px;height:62px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:12px}
  .pname{font:700 17px/1.25 Fraunces,serif}
  .pbrand{color:var(--muted); font-size:13px; margin-top:3px}
  .verdict{padding:18px 16px 14px; text-align:center}
  .pill{display:inline-block; font:700 14px Karla; letter-spacing:.06em; text-transform:uppercase;
        color:#fff; padding:9px 22px; border-radius:999px}
  .pill.green{background:var(--green)} .pill.yellow{background:var(--yellow)}
  .pill.red{background:var(--red)} .pill.unknown{background:var(--muted)}
  .why{font-size:14px; color:var(--ink); margin-top:11px; line-height:1.5; padding:0 6px}
  .conf{font-size:11px; color:var(--muted); margin-top:7px; letter-spacing:.06em; text-transform:uppercase}
  .offers{border-top:1px dashed var(--line)}
  .offer{display:flex; align-items:center; justify-content:space-between; padding:13px 16px;
         border-bottom:1px solid #F1ECE0; gap:8px}
  .offer:last-child{border-bottom:none}
  .oname{font-weight:700; font-size:14px}
  .okind{font-size:11px; color:var(--muted)}
  .oprice{font:700 17px Fraunces,serif; min-width:64px; text-align:right}
  .best .oprice{color:var(--green-deep)}
  .buy{background:#EAF6EF; color:var(--green-deep); padding:8px 13px; font-size:13px; text-decoration:none;
       border-radius:9px; font-weight:700}
  .note{font-size:11.5px; color:var(--muted); margin:16px 4px 0; line-height:1.55}
  .err{margin-top:18px; background:#FDECEA; border:1px solid #F3C1BB; color:#8E2C20; border-radius:14px;
       padding:14px 16px; font-size:14px}
  .skel{margin-top:20px;height:120px;border-radius:18px;background:linear-gradient(100deg,#EFE9DC 40%,#F8F3E8 50%,#EFE9DC 60%);background-size:200% 100%;animation:sh 1.1s infinite}
  @keyframes sh{to{background-position:-200% 0}}
</style>
</head>
<body>
<div class="phone">
  <header><div class="logo">F</div><h1>Fair</h1></header>
  <div class="tag">Never overpay again — scan, compare, decide.</div>
  <div class="mode" id="mode">connecting…</div>

  <div class="scanbox">
    <label>Product barcode (UPC / EAN)</label>
    <div class="row">
      <input id="upc" inputmode="numeric" placeholder="e.g. 049000050103"/>
      <button class="go" onclick="lookup()">Check&nbsp;price</button>
    </div>
    <div class="seen">
      <label>Price you see on the shelf — optional</label>
      <div class="row"><input id="seen" inputmode="decimal" placeholder="e.g. 6.19"/></div>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="result"></div>
  <p class="note" id="footnote"></p>
</div>
<script>
/*__EMBEDDED__*/
const API = location.origin + '/api';
let MODE = 'live', DATA = null;

const DEMO_CHIPS = [
  ['049000050103','Coca-Cola','green'],
  ['051500255162','Jif PB','yellow'],
  ['016000275270','Cheerios','red'],
];

async function init(){
  try{
    const r = await fetch(API + '/health', {signal: AbortSignal.timeout(2500)});
    if(!r.ok) throw 0;
    const h = await r.json();
    document.getElementById('mode').textContent =
      `LIVE API · ${h.products} products · ${h.prices.toLocaleString()} price points`;
    document.getElementById('footnote').textContent =
      'Live mode: product lookups hit OpenFoodFacts in real time; store prices are seeded demo data, not live retailer prices.';
  }catch(e){
    MODE = 'offline';
    DATA = (typeof EMBEDDED !== 'undefined') ? EMBEDDED : null;
    document.getElementById('mode').textContent = DATA
      ? 'OFFLINE PREVIEW · captured output of the real Fair API'
      : 'OFFLINE · no data';
    document.getElementById('footnote').textContent = DATA
      ? 'This preview replays real responses captured from the Fair demo API. Store prices are seeded demo data, not live retailer prices. Run the package for live mode.'
      : 'Start the API (docker compose up) and reload.';
  }
  const chips = document.getElementById('chips');
  for(const [u, n, v] of DEMO_CHIPS){
    const b = document.createElement('button');
    b.className = 'chip';
    b.innerHTML = `${n} <b>· try ${v}</b>`;
    b.onclick = () => { document.getElementById('upc').value = u;
                        document.getElementById('seen').value = (v==='red'?'6.19':''); lookup(); };
    chips.appendChild(b);
  }
}

function normalize(c){ return (c||'').replace(/\D/g,''); }

async function lookup(){
  const upc = normalize(document.getElementById('upc').value);
  const seen = document.getElementById('seen').value.trim();
  const res = document.getElementById('result');
  if(!upc){ res.innerHTML = '<div class="err">Enter a barcode number.</div>'; return; }
  res.innerHTML = '<div class="skel"></div>';

  let d;
  if(MODE === 'live'){
    try{
      const q = seen ? `?price_seen=${encodeURIComponent(seen)}` : '';
      const r = await fetch(`${API}/products/by-upc/${upc}/comparison${q}`);
      if(r.status === 404){ res.innerHTML =
        '<div class="err">Product not found — even with UPC normalization. Try another barcode.</div>'; return; }
      d = await r.json();
    }catch(e){ res.innerHTML = '<div class="err">API unreachable. Is the server running?</div>'; return; }
  }else{
    const seenVal = seen ? parseFloat(seen) : null;
    const upcMatch = p => [p.product.upc, '0'+p.product.upc].includes(upc) || p.product.upc === '0'+upc;
    d = DATA && (
      DATA.products.find(p => upcMatch(p) && p.price_seen === seenVal) ||
      DATA.products.find(p => upcMatch(p) && p.price_seen == null)
    );
    if(!d){ res.innerHTML =
      '<div class="err">Offline preview only includes the sample products — tap a chip above.</div>'; return; }
  }
  render(d, res);
}

function render(d, res){
  const f = d.fairness, p = d.product;
  const offers = (d.offers||[]);
  const best = offers.length ? Math.min(...offers.map(o=>o.price)) : null;
  res.innerHTML = `
  <div class="card">
    <div class="phead">
      ${p.image_url ? `<img src="${p.image_url}" alt=""/>` : ''}
      <div><div class="pname">${p.name}</div><div class="pbrand">${p.brand||''} · UPC ${p.upc}</div></div>
    </div>
    <div class="verdict">
      <span class="pill ${f.verdict}">${{green:'Fair price',yellow:'Borderline',red:'Overpaying',unknown:'Not enough data'}[f.verdict]}</span>
      <div class="why">${f.explanation}</div>
      ${f.confidence ? `<div class="conf">confidence: ${f.confidence}${f.reference_store?` · vs ${f.reference_store}`:''}</div>`:''}
    </div>
    <div class="offers">
      ${offers.map(o=>`
        <div class="offer ${o.price===best?'best':''}">
          <div><div class="oname">${o.store}</div><div class="okind">${o.kind}${o.is_affiliate?' · affiliate':''}</div></div>
          <div class="oprice">$${o.price.toFixed(2)}</div>
          ${o.buy_url?`<a class="buy" href="${o.buy_url}" target="_blank" rel="noopener">Buy</a>`:''}
        </div>`).join('')}
    </div>
  </div>`;
}
init();
</script>
</body>
</html>
